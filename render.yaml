services:
  - type: web
    name: landlord-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        sync: false
      - key: DATA_DIR
        value: /data
      - key: EXTRA_ORIGINS
        sync: false
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
