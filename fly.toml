app = "landlord-api"

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

# 持久卷 — SQLite 数据库存在这里，部署不会丢失
[[mounts]]
  source = "landlord_data"
  destination = "/data"
  initial_size = "1gb"
